name: Deploy Branches

on:
  push:
    branches:
      - main
      - gravity

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set target folder
        id: vars
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "main" ]; then
            echo "target=." >> $GITHUB_OUTPUT
          else
            echo "target=$BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          target-folder: ${{ steps.vars.outputs.target }}
          clean: false